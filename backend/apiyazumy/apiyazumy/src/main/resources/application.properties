server.port=${PORT:8080}
spring.application.name=apirfds220261

spring.jackson.time-zone=America/Lima

spring.datasource.url=${DB_URL:jdbc:mysql://mysql-c5744c2-jhulmervalenzuela2-4b51.a.aivencloud.com:28883/defaultdb?useSSL=true&requireSSL=true}
spring.datasource.username=${DB_USERNAME:avnadmin}
