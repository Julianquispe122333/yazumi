spring.application.name=apiyazumy
spring.security.basic.enabled=false

# Configuración de MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/yazumi_app?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
